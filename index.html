<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstriGo Tech Solutions</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b); /* Din mörkblå toning */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        
        /* Huvudlogon AstriGo */
        .logo-main {
            font-size: 5rem; 
            font-weight: 700;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
        }
        
        /* Den vita delen "Astri" */
        .logo-white {
            color: #ffffff;
        }
        
        /* Den grönblå toningen på "Go" */
        .logo-gradient {
            background: linear-gradient(to bottom, #a3e635 0%, #22c55e 40%, #0284c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        
        /* Undertexten TECH SOLUTIONS */
        .logo-sub {
            font-size: 1.15rem;
            font-weight: 600;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 11px; /* Skapar det utspridda, moderna utseendet */
            margin-top: 12px;
            margin-bottom: 40px;
            padding-left: 11px; 
        }
        
        /* Din ursprungliga text */
        p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 0;
            line-height: 1.6;
        }
        
        .badge {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 25px;
            color: #f8fafc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Under utveckling</div>
        
        <!-- Din nya logotyp uppbyggd i CSS -->
        <div class="logo-main">
            <span class="logo-white">Astri</span><span class="logo-gradient">Go</span>
        </div>
        <div class="logo-sub">Tech Solutions</div>
        
        <!-- Din ursprungliga text -->
        <p>Vi bygger nästa generations digitala lösningar. Landningssidan är under konstruktion och öppnar snart.</p>
        <p style="margin-top: 25px; font-size: 14px; opacity: 0.9;">
        ✉️ Kontakta oss: <a href="mailto:info@astrigo.se" style="color: #fff; text-decoration: underline;">info@astrigo.se</a>
       </p>
    </div>
</body>
</html>
